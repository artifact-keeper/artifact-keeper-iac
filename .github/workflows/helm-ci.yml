name: Helm CI

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm-ci.yml"
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm-ci.yml"

jobs:
  lint:
    name: Lint
    runs-on: ak-ci-runners
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.3

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@e6669bcd63d7cb57cb4380c33043eebe5d111992 # v2.6.1

      - name: Run chart-testing lint
        run: ct lint --target-branch main --charts charts/artifact-keeper/

      - name: Run helm lint
        run: helm lint charts/artifact-keeper/

  template-validation:
    name: "Template & Validate (${{ matrix.variant }})"
    runs-on: ak-ci-runners
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            values_args: ""
          - variant: production
            values_args: "-f charts/artifact-keeper/values-production.yaml"
          - variant: staging
            values_args: "-f charts/artifact-keeper/values-staging.yaml"
          - variant: mesh-main
            values_args: "-f charts/artifact-keeper/values-mesh-main.yaml"
          - variant: mesh-peer
            values_args: "-f charts/artifact-keeper/values-mesh-peer.yaml"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.3

      - name: "Render template (${{ matrix.variant }})"
        run: |
          helm template artifact-keeper charts/artifact-keeper/ \
            ${{ matrix.values_args }} \
            > /tmp/rendered-${{ matrix.variant }}.yaml
          echo "Template rendered successfully for ${{ matrix.variant }} values"

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=0.6.7
          # ARC runners run as a non-root user that cannot write to
          # /usr/local/bin, so extract to /tmp first then sudo mv.
          # Matches the helm-docs install pattern in helm-docs.yml.
          curl -sSL --proto =https "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: "Validate manifests (${{ matrix.variant }})"
        run: |
          kubeconform \
            -summary \
            -strict \
            -ignore-missing-schemas \
            -kubernetes-version 1.31.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered-${{ matrix.variant }}.yaml

  version-check:
    name: Chart Version Check
    if: github.event_name == 'pull_request'
    runs-on: ak-ci-runners
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compare chart version against main
        run: |
          MAIN_VERSION=$(git show origin/main:charts/artifact-keeper/Chart.yaml 2>/dev/null \
            | grep '^version:' | awk '{print $2}' || echo "")

          if [ -z "$MAIN_VERSION" ]; then
            echo "Chart does not exist on main yet, skipping version check"
            exit 0
          fi

          PR_VERSION=$(grep '^version:' charts/artifact-keeper/Chart.yaml | awk '{print $2}')

          if [ "$MAIN_VERSION" = "$PR_VERSION" ]; then
            echo "::warning::Chart version ($PR_VERSION) was not bumped. Consider updating the version in charts/artifact-keeper/Chart.yaml if this PR changes the chart."
          else
            echo "Chart version bumped: $MAIN_VERSION -> $PR_VERSION"
          fi

  install-test:
    name: Install Test (k3d)
    # DISABLED: The k3d cluster comes up fine on ARC runners, but installing
    # the full artifact-keeper chart (backend, web, postgres, trivy, opensearch,
    # dtrack) runs into `context deadline exceeded` because the pods do not
    # fit + initialise within chart-testing's default timeout on a 4 CPU / 8 Gi
    # runner pod. Chart correctness is still validated by `helm lint` and the
    # multi-overlay `helm template` jobs above, so this install smoke test is
    # redundant for release validation. Re-enable once the runner pods have
    # more resources or chart-testing can install only a subset of components.
    # Tracking: https://github.com/artifact-keeper/artifact-keeper-iac/issues
    if: false
    runs-on: ak-ci-runners
    needs: [lint, template-validation]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.3

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@e6669bcd63d7cb57cb4380c33043eebe5d111992 # v2.6.1

      - name: Install kubectl
        uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8 # v4.0.1
        with:
          version: v1.29.3

      - name: Install k3d
        run: |
          # k3d installs k3s inside Docker (uses the DinD sidecar).
          # Pin version for reproducibility. Extract binary to $HOME/.local/bin
          # because the runner pod cannot write to /usr/local/bin.
          K3D_VERSION=v5.7.5
          mkdir -p "$HOME/.local/bin"
          curl -sL "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64" \
            -o "$HOME/.local/bin/k3d"
          chmod +x "$HOME/.local/bin/k3d"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/k3d" version

      - name: Create k3d cluster
        run: |
          # Single-server cluster, no LoadBalancer (not needed for chart-testing
          # install checks). --wait blocks until the apiserver is reachable.
          k3d cluster create chart-testing \
            --agents 0 \
            --no-lb \
            --k3s-arg "--disable=traefik@server:0" \
            --k3s-arg "--disable=metrics-server@server:0" \
            --wait \
            --timeout 120s
          kubectl cluster-info
          kubectl get nodes

      - name: Run chart-testing install
        run: ct install --target-branch main --charts charts/artifact-keeper/

      - name: Delete k3d cluster
        if: always()
        run: |
          k3d cluster delete chart-testing 2>/dev/null || true

      - name: Show cluster state on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -A
          echo ""
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp' -A | tail -40
          echo ""
          echo "=== Describe failing pods ==="
          kubectl get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded -o name \
            | xargs -I{} kubectl describe {} -n default 2>/dev/null || true
