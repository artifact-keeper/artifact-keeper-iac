# ARC v2 Runner Scale Set for heavy jobs (with privileged DinD sidecar)
#
# Purpose
# -------
# Some CI jobs (helm install smoke tests against k3d, full docker-compose
# stacks, Docker image builds with large dep trees) do not fit inside the
# 4 CPU / 8 Gi envelope of ak-ci-runners or ak-e2e-runners. This scale set
# gives those jobs a larger pod to run in without slowing down the rest of
# CI or saturating the regular pools.
#
# Opt jobs in by setting `runs-on: ak-beefy-runners` in the workflow.
#
# Deployed via:
#   helm upgrade --install ak-beefy-runners \
#     --namespace arc-runners \
#     --version 0.13.1 \
#     -f argocd/arc-beefy-runners-values.yaml \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
#
# NOTE: pin --version 0.13.1 to match the ARC controller version already
# running on the cluster (arc-systems namespace). Chart 0.14.x renders an
# incompatible AutoscalingRunnerSet CR that the 0.13.x controller silently
# drops.
#
# Requires secret "github-token-secret" in arc-runners namespace with key "github_token"
#
# Shape mirrors ak-ci-runners (known working) with doubled resources:
#   - dind sidecar placed in initContainers with restartPolicy: Always
#     (K8s native sidecar pattern, required for the 0.13 chart)
#   - dockerd explicit args: --storage-driver=vfs (nested containers) and
#     --group=123 (for /var/run/docker.sock ACL to the runner user)
#   - dind-var mounted at /var/run in both runner and sidecar so the runner
#     can talk to the socket
#
# Capacity check
# --------------
# Per-pod: 4 CPU request / 8 CPU limit, 8 Gi request / 16 Gi limit.
# maxRunners: 5 -> peak 20 CPU / 40 Gi requested across this pool, well
# within Rocky's 88 CPU / 164 Gi allocatable even with ak-ci-runners and
# ak-e2e-runners fully saturated.

githubConfigUrl: "https://github.com/artifact-keeper"
githubConfigSecret: "github-token-secret"
runnerScaleSetName: "ak-beefy-runners"

minRunners: 0
maxRunners: 5

template:
  spec:
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command:
          - /bin/bash
          - -c
          - umask 0000 && /home/runner/run.sh
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: "120"
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-var
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
          limits:
            cpu: "8"
            memory: "16Gi"
    initContainers:
      - name: init-dind-externals
        image: ghcr.io/actions/actions-runner:latest
        command:
          - cp
          - -r
          - /home/runner/externals/.
          - /home/runner/tmpDir/
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir
      - name: dind
        image: docker:27-dind
        args:
          - dockerd
          - --host=unix:///var/run/docker.sock
          - --storage-driver=vfs
          - --group=123
        restartPolicy: Always
        securityContext:
          privileged: true
        startupProbe:
          exec:
            command:
              - docker
              - info
          failureThreshold: 30
          initialDelaySeconds: 3
          periodSeconds: 3
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-var
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
    volumes:
      - name: work
        emptyDir: {}
      - name: dind-var
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
