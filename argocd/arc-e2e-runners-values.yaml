# ARC v2 Runner Scale Set for E2E Tests (with Docker-in-Docker)
#
# Provides Docker capability so CI jobs can run docker-compose
# based E2E test stacks (postgres + backend + test containers).
#
# DOCKER HUB PULL-THROUGH AND AUTH
# --------------------------------
# Two layers, applied independently:
#
# 1. dind sidecar mounts /etc/docker/daemon.json from the
#    `dind-registry-mirror` ConfigMap (e2e/dind-registry-mirror-configmap.yaml)
#    so dockerd routes docker.io pulls through the in-cluster
#    artifact-keeper registry-cache where possible.
#
# 2. The runner container mounts the `dockerhub-pull` Secret at
#    ~/.docker/config.json. When dockerd falls back to docker.io
#    directly (the cache cannot serve dockerd-mirror style requests
#    until the DOCKER_HUB_MIRROR_REPO backend feature ships), the auth
#    raises the rate limit from 100 anonymous pulls / 6h per IP to a
#    per-user budget. See argocd/dockerhub-pull-secret.example.yaml for
#    how to create the Secret.
#
# Deployed via:
#   kubectl apply -f e2e/dind-registry-mirror-configmap.yaml
#   kubectl -n arc-runners create secret docker-registry dockerhub-pull ...
#     (see argocd/dockerhub-pull-secret.example.yaml)
#   helm upgrade --install ak-e2e-runners \
#     --namespace arc-runners \
#     --version 0.13.1 \
#     -f argocd/arc-e2e-runners-values.yaml \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
#
# NOTE: pin --version 0.13.1 to match the ARC controller version
# already running on the cluster (arc-systems namespace).
#
# Requires secret "github-token-secret" in arc-runners namespace with
# key "github_token".

githubConfigUrl: "https://github.com/artifact-keeper"
githubConfigSecret: "github-token-secret"
runnerScaleSetName: "ak-e2e-runners"

minRunners: 0
maxRunners: 5

template:
  spec:
    imagePullSecrets:
      - name: ghcr-pull-secret
    containers:
      - name: runner
        image: ghcr.io/artifact-keeper/ak-runner-e2e:latest
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-var
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
          - name: docker-config-dir
            mountPath: /home/runner/.docker
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
    initContainers:
      - name: init-dockerhub-creds
        # Copy the dockerhub-pull Secret's dockerconfigjson into a
        # writable emptyDir mounted at /home/runner/.docker. This
        # gives docker pulls authenticated rate limits AND leaves
        # ~/.docker/config.json writable for subsequent `docker login`
        # calls (e.g. `docker login ghcr.io` in workflows). The earlier
        # readOnly: true subPath mount blocked those writes (iac#83).
        image: busybox:1.36.1
        securityContext:
          runAsUser: 0
        command:
          - sh
          - -c
          - |
            mkdir -p /home/runner/.docker
            if [ -f /secret/.dockerconfigjson ]; then
              cp /secret/.dockerconfigjson /home/runner/.docker/config.json
              chown 1001:1001 /home/runner/.docker/config.json
              chmod 600 /home/runner/.docker/config.json
              chown 1001:1001 /home/runner/.docker
            else
              echo "WARN: /secret/.dockerconfigjson not found; dockerhub-pull Secret may not be wired"
            fi
        volumeMounts:
          - name: dockerhub-secret
            mountPath: /secret
            readOnly: true
          - name: docker-config-dir
            mountPath: /home/runner/.docker
      - name: init-dind-externals
        image: ghcr.io/artifact-keeper/ak-runner-e2e:latest
        command:
          - cp
          - -r
          - /home/runner/externals/.
          - /home/runner/tmpDir/
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir
      - name: dind
        image: docker:dind
        args:
          - dockerd
          - --host=unix:///var/run/docker.sock
          - --storage-driver=vfs
          - --group=123
        env:
          - name: DOCKER_GROUP_GID
            value: "123"
        restartPolicy: Always
        securityContext:
          privileged: true
        startupProbe:
          exec:
            command:
              - docker
              - info
          failureThreshold: 24
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-var
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
          - name: dind-config
            mountPath: /etc/docker/daemon.json
            subPath: daemon.json
            readOnly: true
    volumes:
      - name: work
        emptyDir: {}
      - name: dind-var
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
      - name: dind-config
        configMap:
          name: dind-registry-mirror
          items:
            - key: daemon.json
              path: daemon.json
      - name: dockerhub-secret
        secret:
          secretName: dockerhub-pull
      - name: docker-config-dir
        emptyDir: {}
