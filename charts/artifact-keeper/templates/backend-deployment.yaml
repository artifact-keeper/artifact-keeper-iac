{{/*
=============================================================================
EXAMPLE CONFIGURATION - Getting Started Template
=============================================================================
This file is provided as a starting point for deployments. It should be
reviewed and modified to match your specific infrastructure requirements,
security policies, and operational needs before use in production.
=============================================================================
*/}}
{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "artifact-keeper.fullname" . }}-backend
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ include "artifact-keeper.backend.replicaCount" . }}
  {{- end }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "artifact-keeper.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "artifact-keeper.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with (.Values.backend.tolerations | default .Values.global.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.backend.affinity | default .Values.global.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.backend.nodeSelector | default .Values.global.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.backend.topologySpreadConstraints | default .Values.global.topologySpreadConstraints) }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "artifact-keeper.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.backend.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.cosign.enabled }}
        - name: verify-image-signature
          image: "{{ .Values.cosign.image.repository }}:{{ .Values.cosign.image.tag }}"
          command: ["cosign", "verify",
            "--certificate-oidc-issuer={{ .Values.cosign.certificateOidcIssuer }}",
            "--certificate-identity-regexp={{ .Values.cosign.certificateIdentityRegexp }}",
            "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"]
          {{- with .Values.backend.initContainerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 128Mi
        {{- end }}
        {{- if .Values.postgres.enabled }}
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          {{- with .Values.backend.initContainerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 64Mi
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL..."
              until pg_isready -h {{ include "artifact-keeper.fullname" . }}-postgres -p 5432 -U {{ .Values.postgres.auth.username }}; do
                sleep 3
              done
              echo "PostgreSQL is ready"
        {{- end }}
        {{- if .Values.opensearch.enabled }}
        - name: wait-for-opensearch
          image: "{{ .Values.backend.waitForOpenSearch.image.repository }}:{{ .Values.backend.waitForOpenSearch.image.tag }}"
          {{- with .Values.backend.initContainerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 64Mi
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for OpenSearch..."
              # Accept green or yellow cluster status. When security is enabled
              # the probe talks to HTTPS with -k; otherwise plain HTTP.
              {{- if .Values.opensearch.disableSecurityPlugin }}
              URL="http://{{ include "artifact-keeper.fullname" . }}-opensearch:9200/_cluster/health"
              CURL_ARGS=""
              {{- else }}
              URL="https://{{ include "artifact-keeper.fullname" . }}-opensearch:9200/_cluster/health"
              CURL_ARGS="-k"
              {{- end }}
              until wget -qO- $URL 2>/dev/null | grep -q '"status":"\(green\|yellow\)"'; do
                sleep 3
              done
              echo "OpenSearch is ready"
        {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          {{- with .Values.backend.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.backend.service.grpcPort }}
              protocol: TCP
            {{- if .Values.backend.metricsListener.enabled }}
            - name: metrics
              containerPort: {{ .Values.backend.metricsListener.port }}
              protocol: TCP
            {{- end }}
          env:
            {{- if .Values.dependencyTrack.enabled }}
            # The backend reads the Dependency-Track API key from this file
            # (see resolve_api_key in dependency_track_service.rs). This replaces
            # the previous `sh -c "export ...; exec"` command wrapper, which the
            # shell-less distroless (ubi-micro) backend image cannot run
            # (CreateContainerError: exec /bin/sh: no such file — iac#199).
            - name: DEPENDENCY_TRACK_API_KEY_FILE
              value: /shared/dtrack-api-key
            {{- end }}
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: DATABASE_URL
              {{- if and (not .Values.postgres.enabled) .Values.externalDatabase.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.existingSecretKey }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.secretName" . }}
                  key: DATABASE_URL
              {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.secretName" . }}
                  key: JWT_SECRET
            {{- if or (and .Values.externalSecrets.enabled .Values.externalSecrets.secrets.migrationEncryptionKey) (and (not .Values.externalSecrets.enabled) .Values.secrets.migrationEncryptionKey) }}
            - name: MIGRATION_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.secretName" . }}
                  key: MIGRATION_ENCRYPTION_KEY
            {{- end }}
            {{- if or (and .Values.externalSecrets.enabled .Values.externalSecrets.secrets.webhookSecretKey) (and (not .Values.externalSecrets.enabled) .Values.secrets.webhookSecretKey) }}
            - name: AK_WEBHOOK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.secretName" . }}
                  key: AK_WEBHOOK_SECRET_KEY
            {{- end }}
            {{- if .Values.opensearch.enabled }}
            - name: OPENSEARCH_URL
              value: "{{ if .Values.opensearch.disableSecurityPlugin }}http{{ else }}https{{ end }}://{{ include "artifact-keeper.fullname" . }}-opensearch:9200"
            {{- if not .Values.opensearch.disableSecurityPlugin }}
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.secretName" . }}
                  key: OPENSEARCH_USERNAME
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.secretName" . }}
                  key: OPENSEARCH_PASSWORD
            - name: OPENSEARCH_ALLOW_INVALID_CERTS
              value: {{ .Values.opensearch.allowInvalidCerts | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.trivy.enabled }}
            - name: TRIVY_URL
              value: "http://{{ include "artifact-keeper.fullname" . }}-trivy:8090"
            - name: SCAN_WORKSPACE_PATH
              value: "/scan-workspace"
            {{- end }}
            {{- if .Values.scannerAdapter.enabled }}
            # In-house Harbor scanner-adapter for container-image Trivy scans
            # (artifact-keeper#2091). Host must match the scanner-adapter Service
            # name. Leaves TRIVY_URL (fs/incus path) above untouched.
            - name: TRIVY_ADAPTER_URL
              value: "http://{{ include "artifact-keeper.fullname" . }}-scanner-adapter:8090"
            {{- end }}
            {{- if .Values.dependencyTrack.enabled }}
            - name: DEPENDENCY_TRACK_URL
              value: "http://{{ include "artifact-keeper.fullname" . }}-dtrack:8080"
            - name: DEPENDENCY_TRACK_ENABLED
              value: "true"
            {{- if not (hasKey .Values.backend.env "ALLOW_HTTP_INTEGRATIONS") }}
            - name: ALLOW_HTTP_INTEGRATIONS
              value: "1"
            {{- end }}
            {{- end }}
            {{- if .Values.secrets.smtpPassword }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.secretName" . }}
                  key: SMTP_PASSWORD
            {{- end }}
            {{- if .Values.backend.metricsListener.enabled }}
            - name: METRICS_PORT
              value: {{ .Values.backend.metricsListener.port | quote }}
            {{- end }}
            {{- if eq (include "artifact-keeper.fleet.enabled" .) "true" }}
            # Object storage for this instance. Artifacts share one bucket with
            # a per-instance key prefix; the non-secret settings (STORAGE_BACKEND,
            # S3_BUCKET, S3_ENDPOINT, S3_REGION and any redirect flags) come from
            # backend.env, and the prefix and access keys are injected here.
            - name: S3_PREFIX
              value: {{ .Values.fleet.instanceId | quote }}
            {{- if .Values.fleet.storage.existingSecret }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.fleet.storage.existingSecret }}
                  key: {{ .Values.fleet.storage.accessKeyIdKey }}
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.fleet.storage.existingSecret }}
                  key: {{ .Values.fleet.storage.secretAccessKeyKey }}
            {{- end }}
            {{- end }}
            {{- /*
            S3 credentials for a standard (non-fleet) install. The backend reads
            S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY; these come from the
            chart-managed Secret (secrets.s3AccessKey / secrets.s3SecretKey) or
            the ExternalSecret. Skipped when the fleet object-storage Secret
            supplies them (that path takes precedence, injected above) and when
            secrets.existingSecret is in use, since a user-managed Secret may
            store the keys under different names.
            */}}
            {{- $fleetManagedS3 := false }}
            {{- if eq (include "artifact-keeper.fleet.enabled" .) "true" }}
            {{- $fleetManagedS3 = .Values.fleet.storage.existingSecret }}
            {{- end }}
            {{- if and (not $fleetManagedS3) (eq (lower (.Values.backend.env.STORAGE_BACKEND | default "")) "s3") }}
            {{- if or .Values.externalSecrets.enabled (and (not .Values.secrets.existingSecret) .Values.secrets.s3AccessKey) }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.secretName" . }}
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.secretName" . }}
                  key: S3_SECRET_ACCESS_KEY
            {{- end }}
            {{- end }}
          resources:
            {{- include "artifact-keeper.backend.resources" . | nindent 12 }}
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: storage
              mountPath: /data/storage
              subPath: storage
            - name: storage
              mountPath: /data/backups
              subPath: backups
            - name: storage
              mountPath: /data/plugins
              subPath: plugins
            {{- if .Values.backend.scanWorkspace.enabled }}
            - name: scan-workspace
              mountPath: /scan-workspace
            {{- end }}
            {{- if .Values.dependencyTrack.enabled }}
            - name: shared-config
              mountPath: /shared
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: storage
          {{- if .Values.backend.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "artifact-keeper.fullname" . }}-storage
          {{- else }}
          emptyDir:
            sizeLimit: 10Gi
          {{- end }}
        {{- if .Values.backend.scanWorkspace.enabled }}
        - name: scan-workspace
          persistentVolumeClaim:
            claimName: {{ include "artifact-keeper.fullname" . }}-scan-workspace
        {{- end }}
        {{- if .Values.dependencyTrack.enabled }}
        - name: shared-config
          persistentVolumeClaim:
            claimName: {{ include "artifact-keeper.fullname" . }}-shared-config
        {{- end }}
{{- end }}
