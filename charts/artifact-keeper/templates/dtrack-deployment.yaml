{{/*
=============================================================================
EXAMPLE CONFIGURATION - Getting Started Template
=============================================================================
This file is provided as a starting point for deployments. It should be
reviewed and modified to match your specific infrastructure requirements,
security policies, and operational needs before use in production.
=============================================================================
*/}}
{{- if .Values.dependencyTrack.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "artifact-keeper.fullname" . }}-dtrack
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: dependency-track
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "artifact-keeper.dtrack.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "artifact-keeper.dtrack.selectorLabels" . | nindent 8 }}
    spec:
      {{- with (.Values.dependencyTrack.tolerations | default .Values.global.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.dependencyTrack.affinity | default .Values.global.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.dependencyTrack.nodeSelector | default .Values.global.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.dependencyTrack.topologySpreadConstraints | default .Values.global.topologySpreadConstraints) }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 64Mi
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL..."
              until pg_isready -h {{ include "artifact-keeper.fullname" . }}-postgres -p 5432 -U {{ .Values.postgres.auth.username }}; do
                sleep 3
              done
              echo "PostgreSQL is ready"
      {{- end }}
      containers:
        - name: dtrack-api
          image: "{{ .Values.dependencyTrack.image.repository }}:{{ .Values.dependencyTrack.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ALPINE_DATABASE_MODE
              value: "external"
            - name: ALPINE_DATABASE_URL
              {{- if .Values.postgres.enabled }}
              value: "jdbc:postgresql://{{ include "artifact-keeper.fullname" . }}-postgres:5432/dependency_track"
              {{- else }}
              value: "jdbc:postgresql://{{ .Values.externalDatabase.host }}:{{ .Values.externalDatabase.port }}/dependency_track"
              {{- end }}
            - name: ALPINE_DATABASE_DRIVER
              value: "org.postgresql.Driver"
            - name: ALPINE_DATABASE_USERNAME
              {{- if .Values.postgres.enabled }}
              value: {{ .Values.postgres.auth.username | quote }}
              {{- else }}
              value: {{ .Values.externalDatabase.username | quote }}
              {{- end }}
            - name: ALPINE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
            - name: ALPINE_DATA_DIRECTORY
              value: "/data"
            - name: ALPINE_ENFORCE_AUTHENTICATION
              value: "true"
            - name: ALPINE_CORS_ENABLED
              value: "true"
            - name: ALPINE_CORS_ALLOW_ORIGIN
              value: "*"
            - name: JAVA_OPTIONS
              value: "-Xmx4g"
          resources:
            {{- toYaml .Values.dependencyTrack.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://localhost:8080/api/version"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://localhost:8080/api/version"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: dtrack-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            # DependencyTrack writes ~1-2Gi into /tmp during startup (NVD
            # mirror sync, DB migrations, JVM working files). A 256Mi
            # ceiling triggers `Usage of EmptyDir volume "tmp" exceeds the
            # limit` evictions partway through init, producing a tight
            # crash-loop. 2Gi default fits stock startup; operators on
            # constrained nodes can tune down via dependencyTrack.tmpSizeLimit.
            sizeLimit: {{ .Values.dependencyTrack.tmpSizeLimit | default "2Gi" }}
        - name: dtrack-data
          persistentVolumeClaim:
            claimName: {{ include "artifact-keeper.fullname" . }}-dtrack
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "artifact-keeper.fullname" . }}-dtrack
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: dependency-track
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.dependencyTrack.persistence.size }}
  {{- if .Values.dependencyTrack.persistence.storageClass }}
  storageClassName: {{ .Values.dependencyTrack.persistence.storageClass | quote }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "artifact-keeper.fullname" . }}-dtrack
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: dependency-track
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    {{- include "artifact-keeper.dtrack.selectorLabels" . | nindent 4 }}
---
{{- if .Values.dependencyTrack.bootstrap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "artifact-keeper.fullname" . }}-dtrack-init
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: dependency-track
data:
  init-dtrack.sh: |
    #!/bin/sh
    set -e

    # Tool preflight. The wrapper in the Job spec (`apk add --no-cache curl jq`)
    # silently swallows failures when the pod has no egress to the alpine
    # package mirrors. Verify the binaries are actually present before we
    # start; otherwise every subsequent `curl` call is silently a no-op
    # and the wait loop below burns its 5-minute budget waiting for a
    # request that was never made.
    for tool in curl jq; do
      if ! command -v "$tool" > /dev/null 2>&1; then
        echo "[dtrack-init] ERROR: $tool not installed. The bootstrap image needs egress to" >&2
        echo "[dtrack-init]        the alpine package repositories. Either grant egress, or" >&2
        echo "[dtrack-init]        replace the dtrack-init container image with one that has" >&2
        echo "[dtrack-init]        curl + jq pre-installed." >&2
        exit 1
      fi
    done

    DT_URL="${DEPENDENCY_TRACK_URL:-http://{{ include "artifact-keeper.fullname" . }}-dtrack:8080}"
    DT_ADMIN_USER="admin"
    DT_DEFAULT_PASS="admin"
    DT_NEW_PASS="${DEPENDENCY_TRACK_ADMIN_PASSWORD}"
    DT_TEAM_NAME="${DEPENDENCY_TRACK_TEAM_NAME:-Automation}"
    API_KEY_FILE="/shared/dtrack-api-key"

    echo "[dtrack-init] Waiting for Dependency-Track at $DT_URL ..."
    for i in $(seq 1 60); do
      if curl -sf "$DT_URL/api/version" > /dev/null 2>&1; then break; fi
      if [ "$i" -eq 60 ]; then echo "[dtrack-init] ERROR: timeout"; exit 1; fi
      sleep 5
    done

    if [ -f "$API_KEY_FILE" ] && [ -s "$API_KEY_FILE" ]; then
      echo "[dtrack-init] API key already provisioned -- skipping"
      exit 0
    fi

    TOKEN=$(curl -sf -X POST "$DT_URL/api/v1/user/login" \
      -H "Content-Type: application/x-www-form-urlencoded" \
      --data-urlencode "username=${DT_ADMIN_USER}" \
      --data-urlencode "password=${DT_NEW_PASS}" 2>/dev/null || true)

    if [ -z "$TOKEN" ] || echo "$TOKEN" | grep -qi "FORCE_PASSWORD_CHANGE"; then
      curl -sf -o /dev/null -X POST "$DT_URL/api/v1/user/forceChangePassword" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        --data-urlencode "username=${DT_ADMIN_USER}" \
        --data-urlencode "password=${DT_DEFAULT_PASS}" \
        --data-urlencode "newPassword=${DT_NEW_PASS}" \
        --data-urlencode "confirmPassword=${DT_NEW_PASS}"
      TOKEN=$(curl -sf -X POST "$DT_URL/api/v1/user/login" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        --data-urlencode "username=${DT_ADMIN_USER}" \
        --data-urlencode "password=${DT_NEW_PASS}" 2>/dev/null || true)
    fi

    if [ -z "$TOKEN" ]; then echo "[dtrack-init] ERROR: auth failed"; exit 1; fi

    # Resolve the team UUID. We generate a fresh key below rather than
    # reading an existing one from this listing: Dependency-Track 4.13+
    # redacts `.apiKeys[*].key` here (only `maskedKey` remains), so the
    # read-from-listing approach silently yields an empty key on 4.13+.
    # (4.11/4.12 still return the full key, but generating is the
    # version-agnostic path.)
    TEAM_UUID=$(curl -sf "$DT_URL/api/v1/team" \
      -H "Authorization: Bearer $TOKEN" | \
      jq -r --arg name "$DT_TEAM_NAME" '.[] | select(.name == $name) | .uuid // empty')

    if [ -z "$TEAM_UUID" ]; then
      echo "[dtrack-init] ERROR: team '$DT_TEAM_NAME' not found" >&2
      exit 1
    fi

    # Generate a fresh API key. Dependency-Track returns the unmasked
    # secret in the response body of this single PUT -- there is no other
    # way to retrieve it afterward. PUT is the generate verb on every 4.x
    # version (verified 4.11.4 / 4.12.7 / 4.13.0 / 4.14.2 -> 201 + .key).
    # POST to this path returns 405 on all of them: DT only accepts
    # POST .../key/{key} to regenerate an existing key, never to create.
    echo "[dtrack-init] Generating new $DT_TEAM_NAME API key..."
    KEY_RESP=$(curl -sf -X PUT "$DT_URL/api/v1/team/$TEAM_UUID/key" \
      -H "Authorization: Bearer $TOKEN" \
      -H "Content-Type: application/json" || true)

    if [ -z "$KEY_RESP" ]; then
      echo "[dtrack-init] ERROR: PUT /api/v1/team/$TEAM_UUID/key returned empty body" >&2
      exit 1
    fi

    API_KEY=$(echo "$KEY_RESP" | jq -r '.key // empty')

    if [ -z "$API_KEY" ]; then
      echo "[dtrack-init] ERROR: response did not contain a 'key' field" >&2
      echo "[dtrack-init]        response was: $KEY_RESP" >&2
      exit 1
    fi

    # Write atomically -- the backend pod polls this file at startup and
    # exporting a partial key would leave it permanently misauthenticated.
    TMP_KEY_FILE="$API_KEY_FILE.tmp"
    umask 077
    printf '%s' "$API_KEY" > "$TMP_KEY_FILE"
    mv "$TMP_KEY_FILE" "$API_KEY_FILE"

    # Enable NVD REST API 2.0 mirroring. NIST retired the legacy JSON feed
    # files in late 2023, so dtrack's default `nvd.feeds.url` source
    # (still configured by some older chart versions) 404s on every poll.
    # The 4.10+ replacement is `nvd.api.enabled=true`; safe to set
    # unconditionally because dtrack ignores unknown config properties.
    echo "[dtrack-init] Enabling NVD REST API 2.0 mirroring..."
    NVD_HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
      -X POST "$DT_URL/api/v1/configProperty" \
      -H "Authorization: Bearer $TOKEN" \
      -H "Content-Type: application/json" \
      -d '{"groupName":"vuln-source","propertyName":"nvd.api.enabled","propertyValue":"true"}' || true)
    if [ "$NVD_HTTP" != "200" ]; then
      echo "[dtrack-init] WARNING: NVD config returned HTTP $NVD_HTTP (may already be set)"
    fi

    echo "[dtrack-init] Done"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "artifact-keeper.fullname" . }}-dtrack-init
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: dependency-track
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "artifact-keeper.dtrack.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      {{- with (.Values.dependencyTrack.tolerations | default .Values.global.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.dependencyTrack.affinity | default .Values.global.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.dependencyTrack.nodeSelector | default .Values.global.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.dependencyTrack.topologySpreadConstraints | default .Values.global.topologySpreadConstraints) }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: dtrack-init
          image: alpine:3.20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
              ephemeral-storage: 128Mi
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Don't silence apk: when the pod has no egress to the
              # alpine mirrors, the install fails silently, the script
              # below runs without `curl` installed, and every `curl`
              # call in it is a no-op. The wait loop then burns its
              # 5-minute budget waiting for a request that was never
              # made, all three backoffs run, the Job is marked Failed,
              # and the only signal is a silent log. The script
              # preflight (`command -v curl`) catches the symptom; this
              # surfacing catches the cause.
              apk add --no-cache curl jq
              /bin/sh /scripts/init-dtrack.sh
          env:
            - name: DEPENDENCY_TRACK_URL
              value: "http://{{ include "artifact-keeper.fullname" . }}-dtrack:8080"
            - name: DEPENDENCY_TRACK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-keeper.fullname" . }}-secrets
                  key: DEPENDENCY_TRACK_ADMIN_PASSWORD
          volumeMounts:
            - name: init-script
              mountPath: /scripts
              readOnly: true
            - name: shared-config
              mountPath: /shared
      volumes:
        - name: init-script
          configMap:
            name: {{ include "artifact-keeper.fullname" . }}-dtrack-init
            defaultMode: 0755
        - name: shared-config
          persistentVolumeClaim:
            claimName: {{ include "artifact-keeper.fullname" . }}-shared-config
{{- end }}
{{- end }}
