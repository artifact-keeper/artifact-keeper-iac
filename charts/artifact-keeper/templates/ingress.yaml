{{/*
=============================================================================
EXAMPLE CONFIGURATION - Getting Started Template
=============================================================================
This file is provided as a starting point for deployments. It should be
reviewed and modified to match your specific infrastructure requirements,
security policies, and operational needs before use in production.
=============================================================================
*/}}
{{- if .Values.ingress.enabled }}
{{- /*
  Ingress annotations: the operator-supplied `ingress.annotations` merged with
  the nginx proxy annotations derived from the dedicated maxBodySize /
  proxyReadTimeoutSeconds / proxySendTimeoutSeconds values. The derived
  annotations are only added when the ingress class is nginx (they are no-ops on
  other controllers), and any key the operator sets explicitly in
  `ingress.annotations` wins over the derived value.
*/}}
{{- $derived := dict }}
{{- if eq (default "" .Values.ingress.className) "nginx" }}
{{- with .Values.ingress.maxBodySize }}
{{- $_ := set $derived "nginx.ingress.kubernetes.io/proxy-body-size" (toString .) }}
{{- end }}
{{- if not (kindIs "invalid" .Values.ingress.proxyReadTimeoutSeconds) }}
{{- $_ := set $derived "nginx.ingress.kubernetes.io/proxy-read-timeout" (toString .Values.ingress.proxyReadTimeoutSeconds) }}
{{- end }}
{{- if not (kindIs "invalid" .Values.ingress.proxySendTimeoutSeconds) }}
{{- $_ := set $derived "nginx.ingress.kubernetes.io/proxy-send-timeout" (toString .Values.ingress.proxySendTimeoutSeconds) }}
{{- end }}
{{- end }}
{{- $annotations := merge (dict) (default dict .Values.ingress.annotations) $derived }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "artifact-keeper.fullname" . }}
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and .Values.ingress.tls.enabled (ne (include "artifact-keeper.fleet.enabled" .) "true") }}
  tls:
    - hosts:
        - {{ include "artifact-keeper.ingressHost" . }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ include "artifact-keeper.ingressHost" . }}
      http:
        paths:
          # API and health endpoints
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "artifact-keeper.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.httpPort }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "artifact-keeper.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.httpPort }}
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: {{ include "artifact-keeper.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.httpPort }}
          # /metrics is not exposed publicly. Use the ServiceMonitor
          # (servicemonitor.yaml) for Prometheus scraping via ClusterIP.
          # OCI / Docker registry
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: {{ include "artifact-keeper.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.httpPort }}
          # Native package format handlers — route directly to backend
          {{- $backendSvc := printf "%s-backend" (include "artifact-keeper.fullname" .) }}
          {{- $backendPort := .Values.backend.service.httpPort }}
          {{- range list "/maven" "/npm" "/pypi" "/nuget" "/cargo" "/gems" "/go" "/helm" "/debian" "/rpm" "/alpine" "/composer" "/conan" "/conda" "/swift" "/terraform" "/cocoapods" "/hex" "/pub" "/lfs" "/ivy" "/chef" "/puppet" "/ansible" "/cran" "/huggingface" "/jetbrains" "/vscode" "/proto" "/incus" "/ext" }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $backendSvc }}
                port:
                  number: {{ $backendPort }}
          {{- end }}
          {{- if .Values.dependencyTrack.enabled }}
          - path: /dtrack
            pathType: Prefix
            backend:
              service:
                name: {{ include "artifact-keeper.fullname" . }}-dtrack
                port:
                  number: 8080
          {{- end }}
          # Catch-all: web frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "artifact-keeper.fullname" . }}-web
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}
