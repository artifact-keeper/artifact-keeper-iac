# =============================================================================
# CloudNativePG PROFILE - dedicated database per service
# =============================================================================
# Layer this file on top of values.yaml:
#
#   helm install ak . -f values.yaml -f values-cnpg.yaml \
#     --set secrets.jwtSecret=$(openssl rand -base64 48)
#
# It expects two CloudNativePG Cluster resources in the release namespace,
# for example:
#
#   apiVersion: postgresql.cnpg.io/v1
#   kind: Cluster
#   metadata:
#     name: ak-backend-db
#   spec:
#     instances: 3
#     storage: { size: 20Gi }
#     bootstrap:
#       initdb:
#         database: artifact_registry
#         owner: registry
#   ---
#   apiVersion: postgresql.cnpg.io/v1
#   kind: Cluster
#   metadata:
#     name: ak-dtrack-db
#   spec:
#     instances: 3
#     storage: { size: 20Gi }
#     bootstrap:
#       initdb:
#         database: dependency_track
#         owner: dtrack
#
# The operator generates the `ak-backend-db-app` and `ak-dtrack-db-app`
# Secrets referenced below. The default key names match the CNPG
# application-secret layout; if the Cluster resources live in a different
# namespace than this release, mirror the Secrets into the release
# namespace and switch the uri/jdbcUri keys to `fqdn-uri`/`fqdn-jdbc-uri`.
#
# Relationship to fleet mode: this profile and fleet.externalDatabaseBootstrap
# both source the backend database from an existing Secret, but they solve
# different problems and are mutually exclusive. The fleet bootstrap path
# provisions one role/database per release on a single shared PostgreSQL
# server (backend only); this profile gives one install a dedicated cluster
# per service and relies on the CloudNativePG operator to provision. Dedicated
# mode takes precedence for the backend DATABASE_URL if both are set, so do
# not combine them.
#
# Airgap note: the wait-for-postgres init containers still run pg_isready
# from postgres.image (postgres:16-alpine by default) even though the
# in-cluster PostgreSQL itself is disabled here, so keep postgres.image on
# pre-pull lists.
# =============================================================================

# The shared in-cluster PostgreSQL is replaced by the two CNPG clusters.
postgres:
  enabled: false

# Opt out of the legacy externalDatabase default so the per-service
# database.existingSecret references below take effect.
externalDatabase:
  enabled: false

backend:
  database:
    existingSecret: ak-backend-db-app

dependencyTrack:
  database:
    existingSecret: ak-dtrack-db-app
